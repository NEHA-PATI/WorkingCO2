name: Backend CI

on:
  push:
    branches:
      - main
      - developer
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
      - developer
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    name: Backend service checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/adminService
          - backend/assetService
          - backend/authentication
          - backend/blogService
          - backend/careerService
          - backend/CFCService
          - backend/contactService
          - backend/demo_service
          - backend/notification-service
          - backend/orgService
          - backend/profile-service
          - backend/rewardService
          - backend/TicketService
          - backend/walletService

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build service
        run: npm run build
