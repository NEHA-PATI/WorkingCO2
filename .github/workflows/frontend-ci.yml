name: Frontend CI

on:
  push:
    branches:
      - main
      - developer
    paths:
      - "frontend/Web_GoCarbonPositive/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches:
      - main
      - developer
    paths:
      - "frontend/Web_GoCarbonPositive/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/Web_GoCarbonPositive

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/Web_GoCarbonPositive/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
